<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Payment Due</title></head>
<body style="margin:0;padding:0;background-color:#f4f5f7;font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f5f7;padding:32px 0;">
    <tr><td align="center">
      <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;overflow:hidden;">
        <tr><td style="background-color:#0f172a;padding:24px 32px;">
          <span style="color:#ffffff;font-size:18px;font-weight:bold;">Scape Data Solutions</span>
        </td></tr>
        <tr><td style="padding:32px;">
          <h1 style="margin:0 0 16px;font-size:20px;color:#111827;">Payment due</h1>
          <p style="margin:0 0 20px;font-size:15px;line-height:1.6;color:#374151;">
            A milestone on {{ contract.title }} is ready to be paid.
          </p>
          <table role="presentation" width="100%" cellpadding="8" cellspacing="0" style="background-color:#f9fafb;border-radius:6px;font-size:14px;color:#374151;">
            <tr><td style="color:#6b7280;">Milestone</td><td align="right">{{ milestone.title }}</td></tr>
            <tr><td style="color:#6b7280;">Amount</td><td align="right"><strong>{{ milestone.currency }} {{ milestone.amount }}</strong></td></tr>
          </table>
          <p style="margin:24px 0;">
            <a href="{{ payment_url }}" style="display:inline-block;background-color:#0f172a;color:#ffffff;text-decoration:none;padding:12px 24px;border-radius:6px;font-size:14px;">Pay now</a>
          </p>
        </td></tr>
        <tr><td style="background-color:#f9fafb;padding:16px 32px;font-size:12px;color:#9ca3af;">&copy; Scape Data Solutions</td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
